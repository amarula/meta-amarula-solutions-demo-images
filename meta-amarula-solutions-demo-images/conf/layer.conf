# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
        ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-amarula-solutions-demo-images"
BBFILE_PATTERN_meta-amarula-solutions-demo-images = "^${LAYERDIR}"
BBFILE_PRIORITY_meta-amarula-solutions-demo-images = "100"

# This should only be incremented on significant changes that will
# cause compatibility issues with other layers
LAYERVERSION_meta-amarula-solutions-demo-images = "1"

LAYERDEPENDS_meta-amarula-solutions-demo-images = " \
    core \
"

LAYERSERIES_COMPAT_meta-amarula-solutions-demo-images = "wrynose"
